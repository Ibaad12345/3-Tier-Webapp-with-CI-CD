<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Project</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 8px; }
        button { padding: 8px 12px; cursor: pointer; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; text-align: left; }
        li { padding: 10px; background: #eee; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>DevOps Tasks</h2>
    <input type="text" id="taskInput" placeholder="Enter a new task...">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    const API_URL = "http://localhost:8000";

    async function fetchTasks() {
        const response = await fetch(`${API_URL}/tasks`);
        const tasks = await response.json();
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasks.forEach(task => {
            const li = document.createElement('li');
            li.textContent = task;
            list.appendChild(li);
        });
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value) return;

        await fetch(`${API_URL}/tasks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: input.value })
        });
        input.value = '';
        fetchTasks();
    }

    fetchTasks();
</script>
</body>
</html>
